<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - BG DEN EUY</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">BG DEN EUY</div>
            <h2>Buat Akun Baru</h2>

            {{if .Error}}
            <div class="alert-error">{{.Error}}</div>
            {{end}}

            {{if .Success}}
            <div class="alert-success">{{.Success}}</div>
            {{end}}

            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" required>
                </div>
                <div class="form-group">
                    <label for="konfirmasi">Konfirmasi Password</label>
                    <input type="password" id="konfirmasi" name="konfirmasi" placeholder="Ulangi password" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Daftar</button>
            </form>

            <p class="login-footer">Sudah punya akun? <a href="/login">Login di sini</a></p>
            <p class="login-footer"><a href="/">← Kembali ke Beranda</a></p>
        </div>
    </div>
</body>
</html>
